route:
  group_by: ['alertname', 'severity', 'route']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'telegram-critical'
  
  routes:
    - matchers:
        - severity="critical"
      receiver: 'telegram-critical'
      continue: true

receivers:
  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}' # Must be set in environment or replaced
        chat_id: ${TELEGRAM_CHAT_ID}
        api_url: 'https://api.telegram.org'
        parse_mode: 'HTML'
        message: |-
          {{ if eq .Status "firing" }}🚨 <b>CRITICAL ALERT</b> 🚨{{ else }}✅ <b>RESOLVED</b>✅{{ end }}
          <b>Alert:</b> {{ .GroupLabels.alertname }}
          <b>Severity:</b> {{ .GroupLabels.severity }}
          {{ range .Alerts }}
          <b>Summary:</b> {{ .Annotations.summary }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Details:</b>
          {{ range $key, $value := .Labels }} - {{ $key }}: {{ $value }}
          {{ end }}
          {{ end }}
