global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'laravel'
    metrics_path: '/prometheus'
    bearer_token: 'secret-prometheus-token'
    static_configs:
      - targets: ['laravel.test:80']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
