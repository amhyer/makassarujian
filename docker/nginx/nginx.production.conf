# ============================================================
# Nginx Production Config — Makassar Ujian
# Target: 10.000+ concurrent users + WebSocket (Reverb)
#
# Deploy: /etc/nginx/nginx.conf  (on VPS)
# Test:   nginx -t
# Reload: nginx -s reload
# ============================================================

# ── Worker tuning ──────────────────────────────────────────
worker_processes      auto;          # Satu worker per CPU core
worker_rlimit_nofile  65535;         # Max open file descriptors per worker

events {
    worker_connections  10000;       # Max 10k connections per worker
    use                 epoll;       # Fastest I/O model on Linux
    multi_accept        on;          # Accept multiple connections at once
}

http {
    # ── Basic settings ─────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;        # Reuse connections for 1000 requests

    # ── Buffer tuning ──────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    output_buffers              1 32k;
    postpone_output             1460;

    # ── Gzip ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1000;
    gzip_types        text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ─────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=exam_api:20m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=exam_save:20m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Upstream: Laravel Octane (multiple nodes) ───────────
    upstream octane_backend {
        least_conn;                      # Route to least-loaded node
        server 127.0.0.1:8000 weight=1;
        server 127.0.0.1:8001 weight=1;  # Add more Octane instances here
        keepalive 64;                    # Persistent upstream connections
    }

    # ── Upstream: Reverb WebSocket (multiple instances) ─────
    # CRITICAL: Reverb is single-threaded — run multiple instances
    # on different ports, each bound to a separate CPU core.
    # Start with: php artisan reverb:start --port=8010
    #             php artisan reverb:start --port=8011
    #             php artisan reverb:start --port=8012
    #             php artisan reverb:start --port=8013
    upstream reverb_backend {
        ip_hash;                         # Sticky session: same client → same Reverb instance
        server 127.0.0.1:8010;
        server 127.0.0.1:8011;
        server 127.0.0.1:8012;
        server 127.0.0.1:8013;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────
    server {
        listen 80;
        server_name ujian.makassar.go.id;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ujian.makassar.go.id;

        ssl_certificate      /etc/letsencrypt/live/ujian.makassar.go.id/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/ujian.makassar.go.id/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;

        root   /var/www/makassarujian/current/public;
        index  index.php;

        # ── Connection limits ─────────────────────────────
        limit_conn perip 100;            # Max 100 simultaneous connections per IP

        # ── WebSocket: Route to Reverb ─────────────────────
        location /app/ {
            proxy_pass         http://reverb_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;    # Hold WS open for 1 hour
            proxy_send_timeout 3600s;
        }

        # ── Exam autosave (high frequency, rate-limited) ───
        location /api/exam/save-answer {
            limit_req zone=exam_save burst=10 nodelay;
            proxy_pass         http://octane_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ── All other API routes ────────────────────────────
        location /api/ {
            limit_req zone=exam_api burst=50 nodelay;
            proxy_pass         http://octane_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ── Static assets (CSS, JS, images) ────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Laravel app ─────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # Octane handles PHP — forward to it
            proxy_pass         http://octane_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
        }

        # ── Health check (no rate limit, no log) ───────────
        location /health {
            proxy_pass http://octane_backend;
            access_log off;
        }
    }
}
